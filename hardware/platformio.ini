[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Build flags
build_flags =
  -DCORE_DEBUG_LEVEL=1
  -DBOARD_HAS_PSRAM

; Serial monitor
monitor_speed = 115200

; Libraries (managed by PlatformIO Registry)
lib_deps =
  mcp2515                        ; autowp/MCP2515 CAN Bus library
  RTClib                         ; adafruit/RTClib@^2.1.4
  ArduinoJson                    ; bblanchon/ArduinoJson@^7.0.0
  ESP32-arduino-SD               ; arduino-libraries/SD@^1.3.0
  WiFi                           ; espressif32 built-in

; Upload & monitoring
upload_speed = 921600
monitor_filters = esp32_exception_decoder

; Test configuration
[env:native]
platform = native
lib_deps =
  bblanchon/ArduinoJson@^7.0.0
